<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>預約單日行事曆系統</title>
    <script src='https://cdn.jsdelivr.net/npm/fullcalendar@6.1.10/index.global.min.js'></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; padding: 20px; background-color: #f9f9f9; }
        .container { max-width: 1100px; margin: auto; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .search-bar { display: flex; gap: 10px; margin-bottom: 20px; align-items: center; }
        input[type="date"] { padding: 8px; border: 1px solid #ccc; border-radius: 4px; }
        button { padding: 8px 16px; background-color: #007bff; color: white; border: none; border-radius: 4px; cursor: pointer; }
        button:hover { background-color: #0056b3; }
        
        #calendar { margin-top: 20px; margin-bottom: 30px; min-height: 600px; }
        .fc-header-toolbar { display: none !important; }

        .legend { display: flex; gap: 15px; margin-bottom: 10px; font-size: 0.9em; }
        .legend-item { display: flex; align-items: center; gap: 5px; }
        .color-box { width: 15px; height: 15px; border-radius: 3px; }

        table { width: 100%; border-collapse: collapse; margin-top: 20px; font-size: 0.9em; }
        th, td { padding: 8px; border: 1px solid #ddd; text-align: left; }
        th { background-color: #f1f1f1; }

        /* ==========================================
           🌟 優化版 QR Code 彈出視窗 (Modal) 的 CSS 樣式
           ========================================== */
        .modal-overlay {
            display: none; 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(15, 23, 42, 0.7); 
            z-index: 1050; 
            justify-content: center; align-items: center;
            opacity: 0; 
            transition: opacity 0.3s ease;
            backdrop-filter: blur(3px); 
        }
        .modal-overlay.show {
            opacity: 1;
        }
        .modal-content {
            background-color: white; 
            border-radius: 16px;
            text-align: center; 
            position: relative;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            width: 90%; max-width: 380px;
            transform: scale(0.8);
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
            overflow: hidden;
        }
        .modal-overlay.show .modal-content {
            transform: scale(1);
        }
        .modal-header {
            background-color: #f8fafc; padding: 16px 20px;
            border-bottom: 1px solid #e2e8f0; display: flex;
            justify-content: space-between; align-items: center;
        }
        .modal-header h3 { margin: 0; font-size: 1.25rem; color: #1e293b; font-weight: 700; }
        .close-btn { font-size: 26px; font-weight: bold; color: #94a3b8; cursor: pointer; line-height: 1; }
        .close-btn:hover { color: #475569; }
        .modal-body { padding: 24px 20px; }
        #modalQrImg { 
            width: 200px; height: 200px; 
            border: 8px solid #fff; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); 
            border-radius: 12px; margin-bottom: 16px;
        }
        .modal-details {
            background: #f1f5f9; padding: 12px 16px; border-radius: 10px;
            text-align: left; font-size: 0.95rem; color: #334155;
        }
        .modal-details p { margin: 6px 0; display: flex; justify-content: space-between; border-bottom: 1px dashed #cbd5e1; padding-bottom: 4px; }
        .modal-details p:last-child { border-bottom: none; padding-bottom: 0; }
        .modal-footer {
            padding: 16px 20px; border-top: 1px solid #e2e8f0;
            background-color: #f8fafc; display: flex; gap: 10px;
        }
        .modal-footer button { 
            flex: 1; padding: 10px; border: none; border-radius: 8px; 
            font-weight: 600; cursor: pointer; transition: all 0.2s; 
        }
        .btn-download { background-color: #3b82f6; color: white; }
        .btn-download:hover { background-color: #2563eb; transform: translateY(-1px); }
        .btn-close-modal { background-color: #e2e8f0; color: #475569; }
        .btn-close-modal:hover { background-color: #cbd5e1; }
        .qr-thumbnail { width: 40px; height: 40px; cursor: pointer; transition: transform 0.2s; border-radius: 4px; }
        .qr-thumbnail:hover { transform: scale(1.15); box-shadow: 0 2px 5px rgba(0,0,0,0.2); }
    </style>
</head>
<body>

<div class="container">
    <h2>預約行事曆查詢 📅</h2>
    
    <div class="search-bar">
        <label for="queryDate">選擇日期：</label>
        <input type="date" id="queryDate" required>
        <button onclick="fetchReservations()">查詢此日預約</button>
    </div>

    <div class="legend" id="legend" style="display: none;">
        <div class="legend-item"><div class="color-box" style="background-color: #fd7e14;"></div>客戶已預約</div>
        <div class="legend-item"><div class="color-box" style="background-color: #007bff;"></div>店家已確認</div>
        <div class="legend-item"><div class="color-box" style="background-color: #28a745;"></div>客戶已報到</div>
    </div>

    <div id="loading" style="display: none; color: #666;">資料載入與繪圖中，請稍候...</div>

    <div id="calendar"></div>

    <table id="resultTable" style="display: none;">
        <thead>
            <tr>
                <th>預約ID</th>
                <th>QR Code</th>
                <th>時間</th>
                <th>客戶姓名</th> 
                <th>聯絡電話</th> 
                <th>寵物姓名</th> 
                <th>服務項目</th>
                <th>美容師名稱</th>
                <th>狀態</th>
            </tr>
        </thead>
        <tbody id="tableBody"></tbody>
    </table>
</div>

<div id="qrModal" class="modal-overlay" onclick="closeQrModal()">
    <div class="modal-content" onclick="event.stopPropagation()">
        <div class="modal-header">
            <h3 id="modalTitle">預約單號</h3>
            <span class="close-btn" onclick="closeQrModal()">&times;</span>
        </div>
        <div class="modal-body">
            <img id="modalQrImg" src="" alt="QR Code">
            <div id="modalDetails" class="modal-details">
                </div>
        </div>
        <div class="modal-footer">
            <button class="btn-download" onclick="downloadQr()">⬇️ 下載圖片</button>
            <button class="btn-close-modal" onclick="closeQrModal()">關閉</button>
        </div>
    </div>
</div>

<script>
(function() {
    const GAS_WEB_APP_URL = window.GAS_API_URL || "https://script.google.com/macros/s/AKfycbyPKmtWJGdq9zqakegIi-GkWgBDij77CbnjeBz0EVFq5iZ8-ey_B_cpBDiywpYtRlY8DA/exec"; 
    
    let localCalendar = null;

    function initView() {
        if (typeof FullCalendar === 'undefined') {
            console.error("FullCalendar 套件載入失敗，請檢查網路連線。");
            return;
        }

        const calendarEl = document.getElementById('calendar');
        if (calendarEl) {
            localCalendar = new FullCalendar.Calendar(calendarEl, {
                initialView: 'timeGridDay',
                locale: 'zh-tw',
                allDaySlot: false,
                slotMinTime: '08:00:00',
                slotMaxTime: '22:00:00',
                slotDuration: '00:30:00',
                expandRows: true,
                eventClick: function(info) {
                    const props = info.event.extendedProps;
                    alert(`預約詳細資訊：\n\n預約單號：${props.rId}\n服務項目：${info.event.title}\n客戶名稱：${props.uName}\n聯絡電話：${props.uPhone}\n寵物名稱：${props.pName}\n美容師：${props.bName}`);
                }
            });
            localCalendar.render();
        }
        
        const dateInputEl = document.getElementById('queryDate');
        if (dateInputEl) {
            dateInputEl.value = new Date().toISOString().split('T')[0];
        }
    }

    window.fetchReservations = async function() {
        const dateInput = document.getElementById('queryDate').value;
        if (!dateInput) {
            alert('請先選擇日期！');
            return;
        }

        document.getElementById('loading').style.display = 'block';
        document.getElementById('legend').style.display = 'none';
        document.getElementById('resultTable').style.display = 'none';
        
        const tbody = document.getElementById('tableBody');
        tbody.innerHTML = ''; 

        try {
            const targetUrl = `${GAS_WEB_APP_URL}?action=getReservationsByDate&date=${dateInput}`;
            const response = await fetch(targetUrl);
            const data = await response.json();

            if (data.error) {
                alert('後端發生錯誤: ' + data.msg);
                return;
            }

            data.sort((a, b) => {
                if (!a.R_StartTime) return 1;
                if (!b.R_StartTime) return -1;
                return a.R_StartTime.localeCompare(b.R_StartTime);
            });

            const calendarEvents = data.filter(item => item.R_Flag != "0").map(item => {
                let eventColor = '#fd7e14'; 
                if (item.R_Confirm == "1" && item.R_CheckIn == "0") {
                    eventColor = '#007bff'; 
                } else if (item.R_Confirm == "1" && item.R_CheckIn == "1") {
                    eventColor = '#28a745'; 
                }

                return {
                    id: item.R_ID,
                    title: `${item.R_ID} | ${item.U_Name} | ${item.P_Name} | ${item.R_Server_Desc}`, 
                    start: `${item.R_Date}T${item.R_StartTime}:00`, 
                    end: `${item.R_Date}T${item.R_EndTime}:00`,
                    backgroundColor: eventColor,
                    borderColor: eventColor,
                    extendedProps: {
                        uName: item.U_Name, 
                        uPhone: item.U_Phone || "無資料",
                        pName: item.P_Name, 
                        bName: item.B_Name, 
                        rId: item.R_ID
                    }
                };
            });

            if (localCalendar) {
                localCalendar.gotoDate(dateInput);
                localCalendar.removeAllEvents();
                localCalendar.addEventSource(calendarEvents);
            }
            document.getElementById('legend').style.display = 'flex';

            if (data.length === 0) {
                tbody.innerHTML = '<tr><td colspan="9" style="text-align:center;">此日期無預約紀錄</td></tr>';
            } else {
                data.forEach(item => {
                    const isCancelled = item.R_Flag == "0";
                    let statusText = "未知狀態";
                    if (isCancelled) statusText = "已取消";
                    else if (item.R_Confirm == "0" && item.R_CheckIn == "0") statusText = "客戶已預約";
                    else if (item.R_Confirm == "1" && item.R_CheckIn == "0") statusText = "店家已確認";
                    else if (item.R_Confirm == "1" && item.R_CheckIn == "1") statusText = "客戶已報到";

                    const rowStyle = isCancelled ? 'style="text-decoration: line-through; color: #999;"' : '';
                    const qrCodeLarge = `https://api.qrserver.com/v1/create-qr-code/?size=250x250&data=${item.R_ID}`;
                    const qrCodeThumb = `https://api.qrserver.com/v1/create-qr-code/?size=50x50&data=${item.R_ID}`;
                    
                    // 🌟 修正：將詳細資訊一起傳入 openQrModal 函式
                    const qrCodeImg = isCancelled ? '-' : `<img src="${qrCodeThumb}" class="qr-thumbnail" title="點擊放大" onclick="window.openQrModal('${qrCodeLarge}', '${item.R_ID}', '${item.U_Name}', '${item.P_Name}', '${item.R_StartTime}')">`;

                    const row = `<tr ${rowStyle}>
                        <td>${item.R_ID}</td>
                        <td style="text-align:center; vertical-align:middle;">${qrCodeImg}</td>
                        <td>${item.R_StartTime} - ${item.R_EndTime}</td>
                        <td>${item.U_Name}</td>
                        <td>${item.U_Phone || ''}</td>
                        <td>${item.P_Name}</td>
                        <td>${item.R_Server_Desc}</td>
                        <td>${item.B_Name}</td>
                        <td>${statusText}</td>
                    </tr>`;
                    tbody.innerHTML += row;
                });
            }
            document.getElementById('resultTable').style.display = 'table';
            
        } catch (error) {
            console.error("Fetch Error:", error);
            alert("連線失敗或資料格式錯誤，請檢查網頁主控台 (Console)");
        } finally {
            document.getElementById('loading').style.display = 'none';
        }
    };

    // 🌟 優化版 Modal 邏輯：接收更多參數並顯示
    window.openQrModal = function(imgUrl, resId, uName, pName, startTime) {
        document.getElementById('modalTitle').innerText = '預約單號：' + resId;
        document.getElementById('modalQrImg').src = imgUrl; 
        
        const detailsHtml = `
            <p><span>預約時間</span> <strong>${startTime}</strong></p>
            <p><span>客戶名稱</span> <strong>${uName}</strong></p>
            <p><span>寵物名稱</span> <strong>${pName}</strong></p>
        `;
        document.getElementById('modalDetails').innerHTML = detailsHtml;

        const modal = document.getElementById('qrModal');
        modal.style.display = 'flex'; 
        setTimeout(() => modal.classList.add('show'), 10);
    };

    window.closeQrModal = function() {
        const modal = document.getElementById('qrModal');
        modal.classList.remove('show'); 
        setTimeout(() => {
            modal.style.display = 'none'; 
            document.getElementById('modalQrImg').src = ''; 
        }, 300);
    };

    // 🌟 新增：下載 QR Code 圖片功能
    window.downloadQr = function() {
        const imgSrc = document.getElementById('modalQrImg').src;
        const resIdText = document.getElementById('modalTitle').innerText;
        const resId = resIdText.replace('預約單號：', '').trim();
        
        fetch(imgSrc)
            .then(response => response.blob())
            .then(blob => {
                const url = window.URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.style.display = 'none';
                a.href = url;
                a.download = `QR_${resId}.png`;
                document.body.appendChild(a);
                a.click();
                window.URL.revokeObjectURL(url);
            })
            .catch(() => {
                window.open(imgSrc, '_blank');
            });
    };

    function checkAndInitCalendar() {
        if (typeof FullCalendar !== 'undefined') {
            initView();
        } else {
            console.log("等待 FullCalendar 載入或動態補給...");
            const script = document.createElement('script');
            script.src = 'https://cdn.jsdelivr.net/npm/fullcalendar@6.1.10/index.global.min.js';
            script.onload = function() {
                initView(); 
            };
            document.head.appendChild(script);
        }
    }

    checkAndInitCalendar();

})();
</script>

</body>
</html>
