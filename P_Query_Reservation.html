<script>
(function() {
    // 💡 修正 1：加上備用網址 (Fallback)。
    // 如果從 SPA 主框架載入，會使用 window.GAS_API_URL；
    // 如果你單獨重新整理或直接開這個 HTML 測試，就會自動切換成這串網址。
    const GAS_WEB_APP_URL = window.GAS_API_URL || "https://script.google.com/macros/s/AKfycbyPKmtWJGdq9zqakegIi-GkWgBDij77CbnjeBz0EVFq5iZ8-ey_B_cpBDiywpYtRlY8DA/exec"; 
    
    let localCalendar = null;

    // 行事曆初始化函數
    function initView() {
        // 💡 修正 2：如果到這裡還是沒有 FullCalendar，多做一層防呆保護
        if (typeof FullCalendar === 'undefined') {
            console.error("FullCalendar 套件載入失敗，請檢查網路連線。");
            return;
        }

        const calendarEl = document.getElementById('calendar');
        if (calendarEl) {
            localCalendar = new FullCalendar.Calendar(calendarEl, {
                initialView: 'timeGridDay',
                locale: 'zh-tw',
                allDaySlot: false,
                slotMinTime: '08:00:00',
                slotMaxTime: '22:00:00',
                slotDuration: '00:30:00',
                expandRows: true,
                eventClick: function(info) {
                    const props = info.event.extendedProps;
                    alert(`預約詳細資訊：\n\n預約單號：${props.rId}\n服務項目：${info.event.title}\n客戶名稱：${props.uName}\n聯絡電話：${props.uPhone}\n寵物名稱：${props.pName}\n美容師：${props.bName}`);
                }
            });
            localCalendar.render();
        }
        
        const dateInputEl = document.getElementById('queryDate');
        if (dateInputEl) {
            dateInputEl.value = new Date().toISOString().split('T')[0];
        }
    }

    window.fetchReservations = async function() {
        const dateInput = document.getElementById('queryDate').value;
        if (!dateInput) {
            alert('請先選擇日期！');
            return;
        }

        document.getElementById('loading').style.display = 'block';
        document.getElementById('legend').style.display = 'none';
        document.getElementById('resultTable').style.display = 'none';
        
        const tbody = document.getElementById('tableBody');
        tbody.innerHTML = ''; 

        try {
            // 使用帶有備用網址的變數，這樣就不會出現 undefined 的錯誤
            const targetUrl = `${GAS_WEB_APP_URL}?action=getReservationsByDate&date=${dateInput}`;
            const response = await fetch(targetUrl);
            const data = await response.json();

            if (data.error) {
                alert('後端發生錯誤: ' + data.msg);
                return;
            }

            data.sort((a, b) => {
                if (!a.R_StartTime) return 1;
                if (!b.R_StartTime) return -1;
                return a.R_StartTime.localeCompare(b.R_StartTime);
            });

            const calendarEvents = data.filter(item => item.R_Flag != "0").map(item => {
                let eventColor = '#fd7e14'; 
                if (item.R_Confirm == "1" && item.R_CheckIn == "0") {
                    eventColor = '#007bff'; 
                } else if (item.R_Confirm == "1" && item.R_CheckIn == "1") {
                    eventColor = '#28a745'; 
                }

                return {
                    id: item.R_ID,
                    title: `${item.R_ID} | ${item.U_Name} | ${item.P_Name} | ${item.R_Server_Desc}`, 
                    start: `${item.R_Date}T${item.R_StartTime}:00`, 
                    end: `${item.R_Date}T${item.R_EndTime}:00`,
                    backgroundColor: eventColor,
                    borderColor: eventColor,
                    extendedProps: {
                        uName: item.U_Name, 
                        uPhone: item.U_Phone || "無資料",
                        pName: item.P_Name, 
                        bName: item.B_Name, 
                        rId: item.R_ID
                    }
                };
            });

            if (localCalendar) {
                localCalendar.gotoDate(dateInput);
                localCalendar.removeAllEvents();
                localCalendar.addEventSource(calendarEvents);
            }
            document.getElementById('legend').style.display = 'flex';

            if (data.length === 0) {
                tbody.innerHTML = '<tr><td colspan="9" style="text-align:center;">此日期無預約紀錄</td></tr>';
            } else {
                data.forEach(item => {
                    const isCancelled = item.R_Flag == "0";
                    let statusText = "未知狀態";
                    if (isCancelled) statusText = "已取消";
                    else if (item.R_Confirm == "0" && item.R_CheckIn == "0") statusText = "客戶已預約";
                    else if (item.R_Confirm == "1" && item.R_CheckIn == "0") statusText = "店家已確認";
                    else if (item.R_Confirm == "1" && item.R_CheckIn == "1") statusText = "客戶已報到";

                    const rowStyle = isCancelled ? 'style="text-decoration: line-through; color: #999;"' : '';
                    const qrCodeLarge = `https://api.qrserver.com/v1/create-qr-code/?size=250x250&data=${item.R_ID}`;
                    const qrCodeThumb = `https://api.qrserver.com/v1/create-qr-code/?size=50x50&data=${item.R_ID}`;
                    const qrCodeImg = isCancelled ? '-' : `<img src="${qrCodeThumb}" class="qr-thumbnail" title="點擊放大" onclick="window.openQrModal('${qrCodeLarge}', '${item.R_ID}')">`;

                    const row = `<tr ${rowStyle}>
                        <td>${item.R_ID}</td>
                        <td style="text-align:center; vertical-align:middle;">${qrCodeImg}</td>
                        <td>${item.R_StartTime} - ${item.R_EndTime}</td>
                        <td>${item.U_Name}</td>
                        <td>${item.U_Phone || ''}</td>
                        <td>${item.P_Name}</td>
                        <td>${item.R_Server_Desc}</td>
                        <td>${item.B_Name}</td>
                        <td>${statusText}</td>
                    </tr>`;
                    tbody.innerHTML += row;
                });
            }
            document.getElementById('resultTable').style.display = 'table';
            
        } catch (error) {
            console.error("Fetch Error:", error);
            alert("連線失敗或資料格式錯誤，請檢查網頁主控台 (Console)");
        } finally {
            document.getElementById('loading').style.display = 'none';
        }
    };

    window.openQrModal = function(imgUrl, resId) {
        document.getElementById('modalTitle').innerText = '預約單號：' + resId;
        document.getElementById('modalQrImg').src = imgUrl; 
        document.getElementById('qrModal').style.display = 'flex'; 
    };

    window.closeQrModal = function() {
        document.getElementById('qrModal').style.display = 'none'; 
        document.getElementById('modalQrImg').src = ''; 
    };

    // 💡 啟動時先檢查 FullCalendar 狀態
    function checkAndInitCalendar() {
        if (typeof FullCalendar !== 'undefined') {
            initView();
        } else {
            console.log("等待 FullCalendar 載入或動態補給...");
            const script = document.createElement('script');
            script.src = 'https://cdn.jsdelivr.net/npm/fullcalendar@6.1.10/index.global.min.js';
            script.onload = function() {
                initView(); 
            };
            document.head.appendChild(script);
        }
    }

    checkAndInitCalendar();

})();
</script>
