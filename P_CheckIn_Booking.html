<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>今日預約報到</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/html5-qrcode"></script>
  <style>
    :root { --primary-color: #0d566f; --bg-light: #f1f5f9; }
    body { background-color: var(--bg-light); font-family: 'Noto Sans TC', sans-serif; padding: 10px; }
    .container { max-width: 98% !important; margin: 0 auto; }
    #reader { width: 100%; max-width: 500px; margin: 0 auto 15px auto; border: 3px solid var(--primary-color); border-radius: 12px; display: none; overflow: hidden; }
    #loadingOverlay { display: none; text-align: center; padding: 40px; background: #fff; border-radius: 15px; margin-bottom: 20px; }
    .field-label { font-weight: 700; color: var(--primary-color); margin-top: 25px; margin-bottom: 12px; font-size: 1.25rem; border-left: 6px solid var(--primary-color); padding-left: 15px; }
    .info-card { background: #fff; border: 1px solid #e2e8f0; border-radius: 15px; padding: 20px; margin-bottom: 12px; }
    .info-row { display: flex; flex-wrap: wrap; border-bottom: 1px solid #f1f5f9; padding: 10px 0; }
    .info-cell { flex: 1; min-width: 45%; display: flex; align-items: flex-start; }
    .info-label { font-weight: 600; color: #64748b; width: 100px; font-size: 1rem; flex-shrink: 0; }
    .info-val { color: #1e293b; font-weight: 500; font-size: 1.1rem; }
    
    /* 加購服務網格樣式 */
    .service-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 10px; }
    .service-card { background: #fff; border: 1.5px solid #e2e8f0; padding: 15px; border-radius: 12px; display: flex; align-items: center; cursor: pointer; transition: 0.2s; }
    .service-card.active { border-color: var(--primary-color); background-color: #f0f9ff; }
    .service-check { width: 22px; height: 22px; margin-right: 12px; accent-color: var(--primary-color); }
  </style>
</head>
<body>
<div class="container">
  <div class="d-flex justify-content-between align-items-center mb-4">
    <h2 class="fw-bold">📅 今日預約報到</h2>
    <button class="btn btn-outline-secondary px-3" onclick="window.location.href='index.html'">返回</button>
  </div>

  <div class="info-card shadow-sm">
    <div id="reader"></div>
    <div class="input-group">
      <input type="text" id="inp_rid" class="form-control form-control-lg" placeholder="掃描或輸入單號">
      <button class="btn btn-dark px-3" id="btn_scan" onclick="toggleScanner()">📷 掃描</button>
      <button class="btn btn-primary px-4" id="btn_doSearch" onclick="doSearch()">查詢</button>
    </div>
  </div>

  <div id="loadingOverlay">
    <div class="spinner-border text-primary" role="status" style="width: 2.5rem; height: 2.5rem;"></div>
    <div class="mt-3 h5 fw-bold text-primary">載入預約資料中...</div>
  </div>

  <div id="detailView" style="display:none;">
    <div id="cust_html"></div>
    <div id="pet_html"></div>
    <div id="sick_html"></div>
    <div id="wary_html"></div>

    <div class="field-label">選取本次主服務</div>
    <div class="info-card">
      <select id="sel_mainService" class="form-select form-select-lg" style="height: 60px; border-radius: 12px;" onchange="updateServicePrice()">
        <option value="">-- 請選擇主服務 --</option>
      </select>
    </div>

    <div class="info-card mt-4">
      <div class="d-flex justify-content-between align-items-center">
        <span class="h5 mb-0 fw-bold text-secondary">預估服務金額</span>
        <span id="txt_servicePrice" class="h2 mb-0 fw-bold text-danger">$ 0</span>
      </div>
    </div>
  </div>
</div>

<script>
  // ==========================================
  // 修改 2: 在這裡填寫您的 GAS Web App URL
  // ==========================================
  const GAS_API_URL = "https://script.google.com/macros/s/AKfycbyPKmtWJGdq9zqakegIi-GkWgBDij77CbnjeBz0EVFq5iZ8-ey_B_cpBDiywpYtRlY8DA/exec"; 
  
  let scanner;
  let serviceList = []; // 修改了變數名稱以符合後面的邏輯

  function toggleScanner() {
    const reader = document.getElementById('reader');
    const btn = document.getElementById('btn_scan');
    if (!scanner || !scanner.isScanning) {
      reader.style.display = 'block';
      btn.innerText = '❌ 關閉';
      scanner = new Html5Qrcode("reader");
      scanner.start({ facingMode: "environment" }, { fps: 10, qrbox: 250 }, (text) => {
        document.getElementById('inp_rid').value = text;
        stopScanner();
        doSearch();
      });
    } else { stopScanner(); }
  }

  function stopScanner() {
    if (scanner) scanner.stop().then(() => {
      document.getElementById('reader').style.display = 'none';
      document.getElementById('btn_scan').innerText = '📷 掃描';
    });
  }

  // 修改 3: 使用 fetch 改寫查詢邏輯
  function doSearch() {
    const rid = document.getElementById('inp_rid').value.trim();
    if(!rid) return;
    setLoadingState(true);
    
    // 使用 fetch 呼叫 GAS API
    fetch(`${GAS_API_URL}?action=searchBookingById&resId=${rid}`)
      .then(response => response.json())
      .then(res => {
        setLoadingState(false);
        if(res.error) {
          alert(res.msg);
          return;
        }
        renderAll(res);
      })
      .catch(err => {
        setLoadingState(false);
        alert("網路請求發生錯誤：" + err.message);
      });
  }

  function setLoadingState(isLoading) {
    document.getElementById('loadingOverlay').style.display = isLoading ? 'block' : 'none';
    document.getElementById('detailView').style.display = isLoading ? 'none' : 'block';
  }
  
  function renderAll(d) {
    document.getElementById('cust_html').innerHTML = `
      <div class="field-label">顧客基本資料 (ID: ${d.U_ID || '--'})</div>
      <div class="info-card">
        <div class="info-row">
          <div class="info-cell"><span class="info-label">名稱</span><span class="info-val">${d.U_Name} ${d.U_Flag==99?'<span class="badge-blacklist">黑名單</span>':''}</span></div>
          <div class="info-cell"><span class="info-label">電話</span><span class="info-val">${d.U_Phone || '---'}</span></div>
        </div>
        <div class="info-row" style="border:none">
          <div class="info-cell"><span class="info-label">客戶備註</span><span class="info-val">${d.U_Memo || '無'}</span></div>
        </div>
      </div>`;

    document.getElementById('pet_html').innerHTML = `
      <div class="field-label">寵物基本資料 (ID: ${d.P_ID || '--'})</div>
      <div class="info-card">
        <div class="info-row">
          <div class="info-cell"><span class="info-label">寵物名稱</span><span class="info-val">${d.P_Name}</span></div>
          <div class="info-cell"><span class="info-label">類型/性別</span><span class="info-val">${d.P_Type} / ${d.P_Sex}</span></div>
        </div>
        <div class="info-row">
          <div class="info-cell"><span class="info-label">目前年紀</span><span class="info-val">${d.P_Age || '未知'}</span></div>
          <div class="info-cell"><span class="info-label">品種</span><span class="info-val">${d.P_Breeds}</span></div>
        </div>
        <div class="info-row">
          <div class="info-cell"><span class="info-label">體重</span><span class="info-val">${d.P_Weight} kg</span></div>
          <div class="info-cell"><span class="info-label">體型</span><span class="info-val">${d.P_Size}</span></div>
        </div>
        <div class="info-row" style="border:none">
          <div class="info-cell"><span class="info-label">飼主備註</span><span class="info-val">${d.P_Memo || '無'}</span></div>
        </div>
      </div>`;

    renderGrid('txt_sick', d, 'PS_None', [
      {k:'PS_CKD', l:'慢性腎衰竭'}, {k:'PS_RV', l:'狂犬病'}, {k:'PS_HI', l:'聽力受損'}, {k:'PS_VI', l:'視力受損'}, {k:'PS_HWD', l:'行動不便'}, {k:'PS_GI', l:'癲癇'}, {k:'PS_CDV', l:'犬瘟熱'}, {k:'PS_PIV', l:'氣管塌陷'}, {k:'PS_HD', l:'心臟病'}, {k:'PS_Asth', l:'氣喘(易喘)'}
    ], [
      {k:'PS_DL', m:'PS_DL_Memo', l:'關節脫臼'}, {k:'PS_NTDs', m:'PS_NTDs_Memo', l:'寄生蟲感染'}, {k:'PS_OA', m:'PS_OA_Memo', l:'骨骼舊傷'}, {k:'PS_AD', m:'PS_AD_Memo', l:'皮膚疾病'}, {k:'PS_Other', m:'PS_Other_Memo', l:'其他'}
    ], '健康無疾病');

    renderGrid('txt_wariness', d, 'PW_None', [
      {k:'PW_ASB', l:'攻擊性'}, {k:'PW_WN', l:'不親狗'}, {k:'PW_Mani', l:'易緊張'}, {k:'PW_SAD', l:'分離焦慮'}, {k:'PW_DDS', l:'掙扎'}, {k:'PW_PD', l:'不親人'}
    ], [
      {k:'PW_BWA', m:'PW_BWA_Memo', l:'敏感部位'}, {k:'PW_Other', m:'PW_Other_Memo', l:'其他'}
    ], '無須注意事項');

    // 載入過濾服務清單
    loadServices(d.P_Type, d.P_Size);
  }

  // 修改 4: 使用 fetch 改寫過濾服務邏輯
  function loadServices(pType, pSize) {
    const sel = document.getElementById('sel_mainService');
    sel.innerHTML = '<option value="">正在過濾服務清單...</option>';
    
    // 使用 fetch 呼叫 GAS API
    fetch(`${GAS_API_URL}?action=getFilteredServices&pType=${encodeURIComponent(pType)}&pSize=${encodeURIComponent(pSize)}`)
      .then(response => response.json())
      .then(list => {
        serviceList = list;
        sel.innerHTML = '<option value="">-- 請選擇主服務 --</option>';
        if (list.error) {
           sel.innerHTML = '<option value="">讀取失敗</option>';
           console.error(list.msg);
           return;
        }
        if (list.length === 0) {
          sel.innerHTML = '<option value="">查無匹配規格的服務</option>';
          return;
        }
        list.forEach(svc => {
          const opt = document.createElement('option');
          opt.value = svc.name;
          opt.text = svc.name + " ($" + svc.price + ")";
          sel.add(opt);
        });
      })
      .catch(err => {
         sel.innerHTML = '<option value="">讀取失敗</option>';
         console.error("網路請求發生錯誤：" + err.message);
      });
  }

  function updateServicePrice() {
    const name = document.getElementById('sel_mainService').value;
    const found = serviceList.find(s => s.name === name);
    document.getElementById('txt_servicePrice').innerText = found ? "$ " + found.price.toLocaleString() : "$ 0";
  }

  function renderGrid(id, d, noneK, simple, complex, noneL) {
    // 若原 HTML 裡沒有宣告 txt_sick 或 txt_wariness 的 div，這裡若報錯，請在上方 HTML 新增對應 id 的 div。
    // 因原檔中 <div id="sick_html"></div> 存在，為避免報錯，此處做簡單容錯保護。
    const container = document.getElementById(id);
    if(!container) return; 

    let h = `<div class="sick-header-card ${d[noneK]==1?'healthy-bg':'normal-bg'}"><input type="checkbox" ${d[noneK]==1?'checked':''} disabled class="me-2"> ${noneL}</div><div class="sick-grid">`;
    simple.forEach(i => h += `<div class="sick-card ${d[i.k]==1?'active':''}"><input type="checkbox" ${d[i.k]==1?'checked':''} disabled class="me-2"> ${i.l}</div>`);
    h += `</div>`;
    complex.forEach(i => h += `<div class="memo-area"><span class="fw-bold d-block mb-1"><input type="checkbox" ${d[i.k]==1?'checked':''} disabled class="me-2"> ${i.l} 說明</span><div class="text-muted small">${d[i.m] || '---'}</div></div>`);
    container.innerHTML = h;
  }
</script>
</body>

</html>
