<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>今日預約報到</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/html5-qrcode"></script>
  <style>
    :root { --primary-color: #0d566f; --bg-light: #f1f5f9; --border-color: #e2e8f0; }
    body { background-color: var(--bg-light); font-family: 'Noto Sans TC', sans-serif; padding: 10px; }
    .container { max-width: 98% !important; margin: 0 auto; }
    
    /* 步驟指示器 */
    .step-header { display: flex; margin-bottom: 20px; background: #fff; border-radius: 12px; overflow: hidden; border: 1px solid var(--border-color); }
    .step-item { flex: 1; text-align: center; padding: 15px; font-weight: bold; color: #94a3b8; border-bottom: 4px solid transparent; cursor: pointer; }
    .step-item.active { color: var(--primary-color); border-bottom-color: var(--primary-color); background: #f0f9ff; }

    /* 基本卡片與標籤 */
    .field-label { font-weight: 700; color: var(--primary-color); margin-top: 30px; margin-bottom: 15px; font-size: 1.3rem; border-left: 6px solid var(--primary-color); padding-left: 15px; }
    .info-card { background: #fff; border: 1px solid var(--border-color); border-radius: 15px; padding: 20px; margin-bottom: 15px; }
    .info-row { display: flex; flex-wrap: wrap; border-bottom: 1px solid #f1f5f9; padding: 10px 0; }
    .info-cell { flex: 1; min-width: 45%; display: flex; align-items: flex-start; }
    .info-label { font-weight: 600; color: #64748b; width: 100px; flex-shrink: 0; }
    .info-val { color: #1e293b; font-weight: 500; }

    /* 圖片樣式還原：病史與注意事項網格 */
    .status-header-box { padding: 15px; border-radius: 12px; font-weight: bold; margin-bottom: 15px; display: flex; align-items: center; border: 2px solid transparent; font-size: 1.1rem; }
    .status-header-box.healthy { background-color: #f0fdf4; color: #166534; border-color: #22c55e; }
    .status-header-box.warning { background-color: #fff; color: #64748b; border-color: var(--border-color); }
    
    .grid-container { display: grid; grid-template-columns: repeat(auto-fill, minmax(22%, 1fr)); gap: 10px; margin-bottom: 20px; }
    .grid-item { background: #fff; border: 1px solid var(--border-color); padding: 12px; border-radius: 10px; display: flex; align-items: center; color: #cbd5e1; transition: 0.2s; }
    .grid-item.active { border-color: #ef4444; background-color: #fff1f2; color: #b91c1c; font-weight: bold; box-shadow: 0 2px 4px rgba(239, 68, 68, 0.1); }
    .grid-item input[type="checkbox"] { margin-right: 10px; transform: scale(1.2); }

    /* 說明區塊樣式 */
    .memo-box { background: #fff; border: 1px solid var(--border-color); padding: 15px; border-radius: 12px; margin-bottom: 10px; }
    .memo-title { font-weight: bold; color: #334155; margin-bottom: 5px; display: flex; align-items: center; }
    .memo-content { color: #64748b; font-size: 0.95rem; padding-left: 28px; }
    .memo-box.active { border-color: #ef4444; }
    .memo-box.active .memo-title { color: #b91c1c; }

    .badge-blacklist { background: #000; color: #fff; padding: 2px 8px; border-radius: 4px; font-size: 0.8rem; }
    #loadingOverlay { display: none; text-align: center; padding: 50px; background: #fff; border-radius: 15px; }
  </style>
</head>
<body>
<div class="container">
  <div class="d-flex justify-content-between align-items-center mb-4">
    <h2 class="fw-bold">📅 今日預約報到</h2>
    <button class="btn btn-outline-secondary px-3" onclick="window.location.href='index.html'">返回</button>
  </div>

  <div class="step-header shadow-sm" id="step_nav">
    <div id="nav_1" class="step-item active" onclick="showStep(1)">1. 資訊確認</div>
    <div id="nav_2" class="step-item" onclick="showStep(2)">2. 服務選取</div>
  </div>

  <div id="search_box" class="info-card shadow-sm">
    <div id="reader"></div>
    <div class="input-group">
      <input type="text" id="inp_rid" class="form-control form-control-lg" placeholder="掃描或輸入單號">
      <button class="btn btn-dark px-3" id="btn_scan" onclick="toggleScanner()">📷 掃描</button>
      <button class="btn btn-primary px-4" id="btn_doSearch" onclick="doSearch()">查詢</button>
    </div>
  </div>

  <div id="loadingOverlay">
    <div class="spinner-border text-primary" role="status" style="width: 3rem; height: 3rem;"></div>
    <div class="mt-3 h5 fw-bold text-primary">讀取資料中...</div>
  </div>

  <div id="detailView" style="display:none;">
    <div id="view_step1">
      <div id="cust_html"></div>
      <div id="pet_html"></div>
      
      <div class="field-label">寵物病史紀錄</div>
      <div id="sick_html"></div>
      
      <div class="field-label">寵物美容注意事項</div>
      <div id="wary_html"></div>

      <div class="mt-4 mb-5">
        <button class="btn btn-primary btn-lg w-100 py-3 fw-bold" onclick="showStep(2)">下一步：選取服務 →</button>
      </div>
    </div>

    <div id="view_step2" style="display:none;">
      <div class="field-label">選取本次主服務</div>
      <div class="info-card">
        <select id="sel_mainService" class="form-select form-select-lg" style="height: 65px; border-radius: 15px;" onchange="updateServicePrice()">
          <option value="">-- 請選擇主服務 --</option>
        </select>
      </div>

      <div class="info-card mt-4 shadow-sm">
        <div class="d-flex justify-content-between align-items-center">
          <span class="h5 mb-0 fw-bold text-secondary">預估服務金額</span>
          <span id="txt_servicePrice" class="h1 mb-0 fw-bold text-danger">$ 0</span>
        </div>
      </div>

      <div class="row g-2 mt-4 mb-5">
        <div class="col-4">
          <button class="btn btn-outline-secondary btn-lg w-100 py-3" onclick="showStep(1)">上一步</button>
        </div>
        <div class="col-8">
          <button class="btn btn-success btn-lg w-100 py-3 fw-bold" onclick="alert('報到存檔中...')">確認報到完成</button>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
  const GAS_API_URL = "https://script.google.com/macros/s/AKfycbyPKmtWJGdq9zqakegIi-GkWgBDij77CbnjeBz0EVFq5iZ8-ey_B_cpBDiywpYtRlY8DA/exec"; 
  let serviceList = [];

  function showStep(s) {
    document.getElementById('view_step1').style.display = s===1 ? 'block' : 'none';
    document.getElementById('view_step2').style.display = s===2 ? 'block' : 'none';
    document.getElementById('nav_1').className = s===1 ? 'step-item active' : 'step-item';
    document.getElementById('nav_2').className = s===2 ? 'step-item active' : 'step-item';
    window.scrollTo(0,0);
  }

  function doSearch() {
    const rid = document.getElementById('inp_rid').value.trim();
    if(!rid) return;
    setLoading(true);
    fetch(`${GAS_API_URL}?action=searchBookingById&resId=${rid}`)
      .then(r => r.json())
      .then(res => {
        setLoading(false);
        if(res.error) { alert(res.msg); return; }
        renderAll(res);
        showStep(1);
      }).catch(() => { setLoading(false); alert("網路連線失敗"); });
  }

  function renderAll(d) {
    // 顧客與寵物基本資料 [cite: 1, 2, 14]
    document.getElementById('cust_html').innerHTML = `
      <div class="field-label">顧客基本資料 (ID: ${d.U_ID})</div>
      <div class="info-card">
        <div class="info-row"><div class="info-cell"><span class="info-label">名稱</span><span class="info-val">${d.U_Name} ${d.U_Flag==99?'<span class="badge-blacklist">黑名單</span>':''}</span></div><div class="info-cell"><span class="info-label">電話</span><span class="info-val">${d.U_Phone}</span></div></div>
        <div class="info-row" style="border:none"><div class="info-cell"><span class="info-label">客戶備註</span><span class="info-val">${d.U_Memo || '無'}</span></div></div>
      </div>`;

    document.getElementById('pet_html').innerHTML = `
      <div class="field-label">寵物基本資料 (ID: ${d.P_ID})</div>
      <div class="info-card">
        <div class="info-row"><div class="info-cell"><span class="info-label">寵物名稱</span><span class="info-val">${d.P_Name}</span></div><div class="info-cell"><span class="info-label">類型/性別</span><span class="info-val">${d.P_Type} / ${d.P_Sex}</span></div></div>
        <div class="info-row"><div class="info-cell"><span class="info-label">品種/體型</span><span class="info-val">${d.P_Breeds} / ${d.P_Size}</span></div><div class="info-cell"><span class="info-label">體重</span><span class="info-val">${d.P_Weight} kg</span></div></div>
      </div>`;

    // 依照圖片還原疾病清單
    renderStatusGrid('sick_html', d, 'PS_None', '健康無疾病', [
      {k:'PS_CKD', l:'慢性腎衰竭'}, {k:'PS_RV', l:'狂犬病'}, {k:'PS_HI', l:'聽力受損'}, {k:'PS_VI', l:'視力受損'},
      {k:'PS_HWD', l:'行動不便'}, {k:'PS_GI', l:'癲癇'}, {k:'PS_CDV', l:'犬瘟熱'}, {k:'PS_PIV', l:'氣管塌陷'},
      {k:'PS_HD', l:'心臟病'}, {k:'PS_Asth', l:'氣喘(易喘)'}
    ], [
      {k:'PS_DL', m:'PS_DL_Memo', l:'關節脫臼'}, {k:'PS_NTDs', m:'PS_NTDs_Memo', l:'寄生蟲感染'}, 
      {k:'PS_OA', m:'PS_OA_Memo', l:'骨骼舊傷'}, {k:'PS_AD', m:'PS_AD_Memo', l:'皮膚疾病'}, {k:'PS_Other', m:'PS_Other_Memo', l:'其他'}
    ]);

    // 依照圖片還原注意事項
    renderStatusGrid('wary_html', d, 'PW_None', '無須注意事項', [
      {k:'PW_ASB', l:'攻擊性'}, {k:'PW_WN', l:'不親狗'}, {k:'PW_Mani', l:'易緊張'}, {k:'PW_SAD', l:'分離焦慮'},
      {k:'PW_DDS', l:'掙扎'}, {k:'PW_PD', l:'不親人'}
    ], [
      {k:'PW_BWA', m:'PW_BWA_Memo', l:'敏感部位'}, {k:'PW_Other', m:'PW_Other_Memo', l:'其他'}
    ]);

    loadServices(d.P_Type, d.P_Size); [cite: 20]
  }

  // 核心渲染函數：完全還原圖片外觀
  function renderStatusGrid(targetId, data, noneKey, noneLabel, gridItems, memoItems) {
    const container = document.getElementById(targetId);
    let html = '';

    // 頂部大框 (健康/無須注意)
    const isHealthy = data[noneKey] == 1;
    html += `<div class="status-header-box ${isHealthy ? 'healthy' : 'warning'}">
              <input type="checkbox" ${isHealthy ? 'checked' : ''} disabled class="me-2"> ${noneLabel}
             </div>`;

    // 網格區 (四欄佈局)
    html += `<div class="grid-container">`;
    gridItems.forEach(item => {
      const active = data[item.k] == 1;
      html += `<div class="grid-item ${active ? 'active' : ''}">
                <input type="checkbox" ${active ? 'checked' : ''} disabled> ${item.l}
               </div>`;
    });
    html += `</div>`;

    // 說明區 (全寬佈局)
    memoItems.forEach(item => {
      const active = data[item.k] == 1;
      html += `<div class="memo-box ${active ? 'active' : ''}">
                <div class="memo-title"><input type="checkbox" ${active ? 'checked' : ''} disabled class="me-2"> ${item.l} 說明</div>
                <div class="memo-content">${data[item.m] || '---'}</div>
               </div>`;
    });
    container.innerHTML = html;
  }

  function loadServices(pType, pSize) {
    const sel = document.getElementById('sel_mainService');
    sel.innerHTML = '<option value="">正在過濾服務清單...</option>';
    fetch(`${GAS_API_URL}?action=getFilteredServices&pType=${encodeURIComponent(pType)}&pSize=${encodeURIComponent(pSize)}`) [cite: 20]
      .then(r => r.json())
      .then(list => {
        serviceList = list;
        sel.innerHTML = '<option value="">-- 請選擇主服務 --</option>';
        if (!list || list.length === 0) { sel.innerHTML = '<option value="">查無規格相符服務</option>'; return; }
        list.forEach(svc => {
          let opt = document.createElement('option');
          opt.value = svc.name;
          opt.text = `${svc.name} ($${svc.price.toLocaleString()})`;
          sel.add(opt);
        });
      });
  }

  function updateServicePrice() {
    const name = document.getElementById('sel_mainService').value;
    const found = serviceList.find(s => s.name === name);
    document.getElementById('txt_servicePrice').innerText = found ? "$ " + found.price.toLocaleString() : "$ 0";
  }

  function setLoading(l) {
    document.getElementById('loadingOverlay').style.display = l ? 'block' : 'none';
    document.getElementById('detailView').style.display = l ? 'none' : 'block';
    document.getElementById('search_box').style.display = l ? 'none' : 'block';
  }

  let scanner;
  function toggleScanner() { /* 保持原有的 Html5Qrcode 邏輯 */ }
</script>
</body>
</html>
