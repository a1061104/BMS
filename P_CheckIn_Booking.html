<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>今日預約報到</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/html5-qrcode"></script>
  <style>
    :root { --primary-color: #0d566f; --bg-light: #f1f5f9; }
    body { background-color: var(--bg-light); font-family: 'Noto Sans TC', sans-serif; padding: 10px; }
    .container { max-width: 98% !important; margin: 0 auto; }
    #reader { width: 100%; max-width: 500px; margin: 0 auto 15px auto; border: 3px solid var(--primary-color); border-radius: 12px; display: none; overflow: hidden; }
    #loadingOverlay { display: none; text-align: center; padding: 40px; background: #fff; border-radius: 15px; margin-bottom: 20px; }
    
    /* 步驟指示 */
    .step-indicator { display: flex; justify-content: space-between; margin-bottom: 20px; }
    .step-dot { flex: 1; text-align: center; padding: 10px; border-bottom: 4px solid #cbd5e1; color: #94a3b8; font-weight: bold; }
    .step-dot.active { border-bottom-color: var(--primary-color); color: var(--primary-color); }

    .field-label { font-weight: 700; color: var(--primary-color); margin-top: 25px; margin-bottom: 12px; font-size: 1.25rem; border-left: 6px solid var(--primary-color); padding-left: 15px; }
    .info-card { background: #fff; border: 1px solid #e2e8f0; border-radius: 15px; padding: 20px; margin-bottom: 12px; }
    .info-row { display: flex; flex-wrap: wrap; border-bottom: 1px solid #f1f5f9; padding: 10px 0; }
    .info-cell { flex: 1; min-width: 45%; display: flex; align-items: flex-start; }
    .info-label { font-weight: 600; color: #64748b; width: 100px; font-size: 1rem; flex-shrink: 0; }
    .info-val { color: #1e293b; font-weight: 500; font-size: 1.1rem; }
    
    /* 複用原有的網格樣式 */
    .sick-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 8px; margin-top: 10px; }
    .sick-card { padding: 8px; border: 1px solid #e2e8f0; border-radius: 8px; font-size: 0.9rem; display: flex; align-items: center; }
    .sick-card.active { background: #fee2e2; border-color: #ef4444; color: #b91c1c; }
    .healthy-bg { background-color: #f0fdf4; border: 1px solid #bbf7d0; padding: 10px; border-radius: 8px; margin-bottom: 10px; }
    .normal-bg { background-color: #f8fafc; border: 1px solid #e2e8f0; padding: 10px; border-radius: 8px; margin-bottom: 10px; }
  </style>
</head>
<body>
<div class="container">
  <div class="d-flex justify-content-between align-items-center mb-4">
    <h2 class="fw-bold">📅 今日預約報到</h2>
    <button class="btn btn-outline-secondary px-3" onclick="window.location.href='index.html'">返回</button>
  </div>

  <div class="step-indicator">
    <div id="dot_1" class="step-dot active">1. 確認資料</div>
    <div id="dot_2" class="step-dot">2. 選取服務</div>
  </div>

  <div id="search_box" class="info-card shadow-sm">
    <div id="reader"></div>
    <div class="input-group">
      <input type="text" id="inp_rid" class="form-control form-control-lg" placeholder="掃描或輸入單號">
      <button class="btn btn-dark px-3" id="btn_scan" onclick="toggleScanner()">📷 掃描</button>
      <button class="btn btn-primary px-4" id="btn_doSearch" onclick="doSearch()">查詢</button>
    </div>
  </div>

  <div id="loadingOverlay">
    <div class="spinner-border text-primary" role="status"></div>
    <div class="mt-3 h5 fw-bold text-primary">載入預約資料中...</div>
  </div>

  <div id="detailView" style="display:none;">
    
    <div id="view_step1">
      <div id="cust_html"></div>
      <div id="pet_html"></div>
      <div id="sick_html"></div>
      <div id="wary_html"></div>
      
      <div class="mt-4 mb-5">
        <button class="btn btn-primary btn-lg w-100 py-3 fw-bold" onclick="changeStep(2)">下一步：選擇服務項目</button>
      </div>
    </div>

    <div id="view_step2" style="display:none;">
      <div class="field-label">選取本次主服務</div>
      <div class="info-card">
        <select id="sel_mainService" class="form-select form-select-lg" style="height: 60px; border-radius: 12px;" onchange="updateServicePrice()">
          <option value="">-- 請選擇主服務 --</option>
        </select>
      </div>

      <div class="info-card mt-4">
        <div class="d-flex justify-content-between align-items-center">
          <span class="h5 mb-0 fw-bold text-secondary">預估服務金額</span>
          <span id="txt_servicePrice" class="h2 mb-0 fw-bold text-danger">$ 0</span>
        </div>
      </div>

      <div class="row g-2 mt-4 mb-5">
        <div class="col-4">
          <button class="btn btn-outline-secondary btn-lg w-100 py-3" onclick="changeStep(1)">上一步</button>
        </div>
        <div class="col-8">
          <button class="btn btn-success btn-lg w-100 py-3 fw-bold" onclick="alert('報到存檔功能開發中')">確認報到完成</button>
        </div>
      </div>
    </div>

  </div>
</div>

<script>
  const GAS_API_URL = "https://script.google.com/macros/s/AKfycbyPKmtWJGdq9zqakegIi-GkWgBDij77CbnjeBz0EVFq5iZ8-ey_B_cpBDiywpYtRlY8DA/exec"; 
  let scanner;
  let serviceList = [];

  // 切換視圖邏輯
  function changeStep(step) {
    if(step === 1) {
      document.getElementById('view_step1').style.display = 'block';
      document.getElementById('view_step2').style.display = 'none';
      document.getElementById('dot_1').classList.add('active');
      document.getElementById('dot_2').classList.remove('active');
    } else {
      document.getElementById('view_step1').style.display = 'none';
      document.getElementById('view_step2').style.display = 'block';
      document.getElementById('dot_1').classList.remove('active');
      document.getElementById('dot_2').classList.add('active');
    }
    window.scrollTo(0,0);
  }

  // 1. 查詢邏輯：完全保留原本 fetch 到 action=searchBookingById 的邏輯 
  function doSearch() {
    const rid = document.getElementById('inp_rid').value.trim();
    if(!rid) return;
    setLoadingState(true);
    
    fetch(`${GAS_API_URL}?action=searchBookingById&resId=${rid}`)
      .then(response => response.json())
      .then(res => {
        setLoadingState(false);
        if(res.error) { alert(res.msg); return; }
        renderAll(res); // 渲染資料
        loadServices(res.P_Type, res.P_Size); // 同時背景讀取服務清單
        changeStep(1); // 確保回到第一步
      })
      .catch(err => {
        setLoadingState(false);
        alert("網路請求發生錯誤");
      });
  }

  function setLoadingState(isLoading) {
    document.getElementById('loadingOverlay').style.display = isLoading ? 'block' : 'none';
    document.getElementById('detailView').style.display = isLoading ? 'none' : 'block';
    document.getElementById('search_box').style.display = isLoading ? 'none' : 'block';
  }
  
  // 2. 渲染邏輯：保留原本 HTML 拼接邏輯
  function renderAll(d) {
    document.getElementById('cust_html').innerHTML = `
      <div class="field-label">顧客基本資料 (ID: ${d.U_ID || '--'})</div>
      <div class="info-card">
        <div class="info-row">
          <div class="info-cell"><span class="info-label">名稱</span><span class="info-val">${d.U_Name} ${d.U_Flag==99?'<span class="badge-blacklist">黑名單</span>':''}</span></div>
          <div class="info-cell"><span class="info-label">電話</span><span class="info-val">${d.U_Phone || '---'}</span></div>
        </div>
      </div>`;

    document.getElementById('pet_html').innerHTML = `
      <div class="field-label">寵物基本資料</div>
      <div class="info-card">
        <div class="info-row">
          <div class="info-cell"><span class="info-label">名稱</span><span class="info-val">${d.P_Name} (${d.P_Type})</span></div>
          <div class="info-cell"><span class="info-label">品種</span><span class="info-val">${d.P_Breeds}</span></div>
        </div>
      </div>`;

    // 呼叫原本提供的渲染網格邏輯
    renderGrid('sick_html', d, 'PS_None', [
      {k:'PS_CKD', l:'慢性腎衰竭'}, {k:'PS_RV', l:'狂犬病'}, {k:'PS_HI', l:'聽力受損'}, {k:'PS_VI', l:'視力受損'}, {k:'PS_HWD', l:'行動不便'}
    ], [], '健康狀況');

    renderGrid('wary_html', d, 'PW_None', [
      {k:'PW_ASB', l:'攻擊性'}, {k:'PW_WN', l:'不親狗'}
    ], [], '注意事項');
  }

  // 3. 過濾服務：完全保留原本 fetch 到 action=getFilteredServices 的邏輯 
  function loadServices(pType, pSize) {
    const sel = document.getElementById('sel_mainService');
    sel.innerHTML = '<option value="">正在過濾服務清單...</option>';
    
    fetch(`${GAS_API_URL}?action=getFilteredServices&pType=${encodeURIComponent(pType)}&pSize=${encodeURIComponent(pSize)}`)
      .then(response => response.json())
      .then(list => {
        serviceList = list;
        sel.innerHTML = '<option value="">-- 請選擇主服務 --</option>';
        if (list.error || list.length === 0) {
          sel.innerHTML = '<option value="">無匹配規格的服務</option>';
          return;
        }
        list.forEach(svc => {
          const opt = document.createElement('option');
          opt.value = svc.name;
          opt.text = `${svc.name} ($${svc.price})`;
          sel.add(opt);
        });
      });
  }

  function updateServicePrice() {
    const name = document.getElementById('sel_mainService').value;
    const found = serviceList.find(s => s.name === name);
    document.getElementById('txt_servicePrice').innerText = found ? "$ " + found.price.toLocaleString() : "$ 0";
  }

  function renderGrid(id, d, noneK, simple, complex, title) {
    const container = document.getElementById(id);
    if(!container) return;
    let h = `<div class="field-label">${title}</div><div class="info-card">`;
    h += `<div class="${d[noneK]==1?'healthy-bg':'normal-bg'}">${d[noneK]==1?'✅ 無紀錄':'⚠️ 注意事項'}</div>`;
    h += `<div class="sick-grid">`;
    simple.forEach(i => {
      h += `<div class="sick-card ${d[i.k]==1?'active':''}"><input type="checkbox" ${d[i.k]==1?'checked':''} disabled class="me-2"> ${i.l}</div>`;
    });
    h += `</div></div>`;
    container.innerHTML = h;
  }

  function toggleScanner() { /* 原掃描邏輯... */ }
</script>
</body>
</html>
