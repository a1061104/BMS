<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>今日預約報到</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/html5-qrcode"></script>
  <style>
    :root { --primary-color: #0d566f; --bg-light: #f1f5f9; }
    body { background-color: var(--bg-light); font-family: 'Noto Sans TC', sans-serif; padding: 10px; }
    .container { max-width: 98% !important; margin: 0 auto; }
    #reader { width: 100%; max-width: 500px; margin: 0 auto 15px auto; border: 3px solid var(--primary-color); border-radius: 12px; display: none; overflow: hidden; }
    #loadingOverlay { display: none; text-align: center; padding: 40px; background: #fff; border-radius: 15px; margin-bottom: 20px; }
    
    .step-header { display: flex; margin-bottom: 20px; background: #fff; border-radius: 10px; border: 1px solid #e2e8f0; }
    .step-item { flex: 1; text-align: center; padding: 12px; font-weight: bold; color: #94a3b8; border-bottom: 4px solid transparent; cursor: pointer; }
    .step-item.active { color: var(--primary-color); border-bottom-color: var(--primary-color); background: #f0f9ff; }

    .field-label { font-weight: 700; color: var(--primary-color); margin-top: 25px; margin-bottom: 12px; font-size: 1.25rem; border-left: 6px solid var(--primary-color); padding-left: 15px; }
    .info-card { background: #fff; border: 1px solid #e2e8f0; border-radius: 15px; padding: 20px; margin-bottom: 12px; }
    .info-row { display: flex; flex-wrap: wrap; border-bottom: 1px solid #f1f5f9; padding: 10px 0; }
    .info-cell { flex: 1; min-width: 45%; display: flex; align-items: flex-start; }
    .info-label { font-weight: 600; color: #64748b; width: 100px; flex-shrink: 0; }
    
    .status-header-box { padding: 15px; border-radius: 12px; font-weight: bold; margin-bottom: 15px; display: flex; align-items: center; border: 2px solid transparent; }
    .status-header-box.healthy { background-color: #f0fdf4; color: #166534; border-color: #22c55e; }
    .status-header-box.warning { background-color: #fff; color: #64748b; border-color: #e2e8f0; }
    
    .grid-container { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 20px; }
    .grid-item { background: #fff; border: 1px solid #e2e8f0; padding: 10px; border-radius: 8px; display: flex; align-items: center; font-size: 0.9rem; color: #64748b; }
    .grid-item.active { border-color: #ef4444; background-color: #fff1f2; color: #b91c1c; font-weight: bold; }
    
    .memo-box { background: #fff; border: 1px solid #e2e8f0; padding: 15px; border-radius: 12px; margin-bottom: 10px; }
    .memo-title { font-weight: bold; color: #334155; margin-bottom: 5px; }
    .memo-content { color: #64748b; font-size: 0.9rem; padding-left: 25px; }
    .memo-box.active { border-color: #ef4444; }
    
    .badge-blacklist { background: #000; color: #fff; padding: 2px 8px; border-radius: 4px; font-size: 0.8rem; }
  </style>
</head>
<body>
<div class="container">
  <div class="d-flex justify-content-between align-items-center mb-4">
    <h2 class="fw-bold">📅 今日預約報到</h2>
    <button class="btn btn-outline-secondary px-3" onclick="window.location.href='index.html'">返回</button>
  </div>

  <div class="step-header shadow-sm">
    <div id="step_dot_1" class="step-item active" onclick="showStep(1)">1. 資訊確認</div>
    <div id="step_dot_2" class="step-item" onclick="showStep(2)">2. 服務選取</div>
  </div>

  <div id="searchSection" class="info-card shadow-sm">
    <div id="reader"></div>
    <div class="input-group">
      <input type="text" id="inp_rid" class="form-control form-control-lg" placeholder="掃描或輸入單號">
      <button class="btn btn-dark px-3" id="btn_scan" onclick="toggleScanner()">📷 掃描</button>
      <button class="btn btn-primary px-4" id="btn_doSearch" onclick="doSearch()">查詢</button>
    </div>
  </div>

  <div id="loadingOverlay">
    <div class="spinner-border text-primary" role="status"></div>
    <div class="mt-3 h5 fw-bold">讀取資料中...</div>
  </div>

  <div id="detailView" style="display:none;">
    <div id="view_step1">
      <div id="cust_html"></div>
      <div id="pet_html"></div>
      <div class="field-label">寵物病史紀錄</div>
      <div id="sick_html"></div>
      <div class="field-label">寵物美容注意事項</div>
      <div id="wary_html"></div>
      <button class="btn btn-primary btn-lg w-100 py-3 mt-4" onclick="showStep(2)">下一步：選取服務</button>
    </div>

    <div id="view_step2" style="display:none;">
      <div class="field-label">選取本次主服務</div>
      <div class="info-card">
        <select id="sel_mainService" class="form-select form-select-lg" onchange="updateServicePrice()">
          <option value="">-- 請選擇主服務 --</option>
        </select>
      </div>
      
      <div class="field-label">選取加購服務（選填）</div>
      <div class="info-card">
        <select id="sel_addonService" class="form-select form-select-lg" onchange="updateServicePrice()">
          <option value="">-- 無加購 --</option>
        </select>
      </div>

      <div class="field-label">選取毛型（選填）</div>
      <div class="info-card">
        <select id="sel_hairService" class="form-select form-select-lg" onchange="updateServicePrice()">
          <option value="">-- 無加選毛型 --</option>
        </select>
      </div>

      <div class="field-label">選取雙層毛型（選填）</div>
      <div class="info-card">
        <select id="sel_DoublehairService" class="form-select form-select-lg" onchange="updateServicePrice()">
          <option value="">-- 無加選毛型 --</option>
        </select>
      </div>

      <div class="info-card mt-4">
        <div class="d-flex justify-content-between align-items-center">
          <span class="h5 mb-0 fw-bold text-secondary">預估服務金額</span>
          <span id="txt_servicePrice" class="h2 mb-0 fw-bold text-danger">$ 0</span>
        </div>
      </div>
      <div class="row g-2 mt-4">
        <div class="col-4"><button class="btn btn-outline-secondary btn-lg w-100 py-3" onclick="showStep(1)">上一步</button></div>
        <div class="col-8"><button class="btn btn-success btn-lg w-100 py-3 fw-bold" onclick="alert('報到成功')">確認報到</button></div>
      </div>
    </div>
  </div>
</div>

<script>
  // !!! 請將這裡換成您最新的 GAS Web App URL !!!
  var GAS_API_URL = "https://script.google.com/macros/s/AKfycbyPKmtWJGdq9zqakegIi-GkWgBDij77CbnjeBz0EVFq5iZ8-ey_B_cpBDiywpYtRlY8DA/exec"; 
  var serviceList = [];
  var addonList = []; // 新增加購清單陣列
  var hairList = []; // 【新增】存放毛型服務清單
  var doublehairList = []; // 【新增】存放毛型服務清單
  var scanner;

  function showStep(s) {
    document.getElementById('view_step1').style.display = (s === 1) ? 'block' : 'none';
    document.getElementById('view_step2').style.display = (s === 2) ? 'block' : 'none';
    document.getElementById('step_dot_1').className = (s === 1) ? 'step-item active' : 'step-item';
    document.getElementById('step_dot_2').className = (s === 2) ? 'step-item active' : 'step-item';
    window.scrollTo(0, 0);
  }

  function doSearch() {
    var rid = document.getElementById('inp_rid').value.trim();
    if (!rid) return;
    setLoadingState(true);
    
    fetch(GAS_API_URL + "?action=searchBookingById&resId=" + rid)
      .then(function(res) { return res.json(); })
      .then(function(d) {
        setLoadingState(false);
        if (d.error) { alert(d.msg); return; }
        renderAll(d);
        showStep(1);
      })
      .catch(function(err) { 
        setLoadingState(false); 
        console.error("Fetch Error:", err); // 幫助我們在 F12 Console 看到真實錯誤
        alert("查詢出錯，請確認 GAS API 部署權限是否為「所有人(Anyone)」"); 
      });
  }

  function renderAll(d) {
    var custHtml = '<div class="field-label">顧客基本資料 (ID: ' + (d.U_ID || '--') + ')</div>' +
      '<div class="info-card">' +
        '<div class="info-row"><div class="info-cell"><span class="info-label">名稱</span><span class="info-val">' + d.U_Name + (d.U_Flag==99?' <span class="badge-blacklist">黑名單</span>':'') + '</span></div><div class="info-cell"><span class="info-label">電話</span><span class="info-val">' + (d.U_Phone || '---') + '</span></div></div>' +
        '<div class="info-row" style="border:none"><div class="info-cell"><span class="info-label">客戶備註</span><span class="info-val">' + (d.U_Memo || '無') + '</span></div></div>' +
      '</div>';
    document.getElementById('cust_html').innerHTML = custHtml;

    var petHtml = '<div class="field-label">寵物基本資料</div>' +
      '<div class="info-card">' +
        '<div class="info-row"><div class="info-cell"><span class="info-label">寵物名稱</span><span class="info-val">' + d.P_Name + '</span></div><div class="info-cell"><span class="info-label">類型/性別</span><span class="info-val">' + d.P_Type + ' / ' + d.P_Sex + '</span></div></div>' +
        '<div class="info-row"><div class="info-cell"><span class="info-label">品種/體型</span><span class="info-val">' + d.P_Breeds + ' / ' + d.P_Size + '</span></div><div class="info-cell"><span class="info-label">體重</span><span class="info-val">' + d.P_Weight + ' kg</span></div></div>' +
      '</div>';
    document.getElementById('pet_html').innerHTML = petHtml;

    renderStatusGrid('sick_html', d, 'PS_None', '健康無疾病', 
      [{k:'PS_CKD', l:'慢性腎衰竭'}, {k:'PS_RV', l:'狂犬病'}, {k:'PS_HI', l:'聽力受損'}, {k:'PS_VI', l:'視力受損'}, {k:'PS_HWD', l:'行動不便'}, {k:'PS_GI', l:'癲癇'}, {k:'PS_CDV', l:'犬瘟熱'}, {k:'PS_PIV', l:'氣管塌陷'}, {k:'PS_HD', l:'心臟病'}, {k:'PS_Asth', l:'氣喘(易喘)'}], 
      [{k:'PS_DL', m:'PS_DL_Memo', l:'關節脫臼'}, {k:'PS_NTDs', m:'PS_NTDs_Memo', l:'寄生蟲感染'}, {k:'PS_OA', m:'PS_OA_Memo', l:'骨骼舊傷'}, {k:'PS_AD', m:'PS_AD_Memo', l:'皮膚疾病'}, {k:'PS_Other', m:'PS_Other_Memo', l:'其他'}]
    );

    renderStatusGrid('wary_html', d, 'PW_None', '無須注意事項', 
      [{k:'PW_ASB', l:'攻擊性'}, {k:'PW_WN', l:'不親狗'}, {k:'PW_Mani', l:'易緊張'}, {k:'PW_SAD', l:'分離焦慮'}, {k:'PW_DDS', l:'掙扎'}, {k:'PW_PD', l:'不親人'}], 
      [{k:'PW_BWA', m:'PW_BWA_Memo', l:'敏感部位'}, {k:'PW_Other', m:'PW_Other_Memo', l:'其他'}]
    );

    loadServices(d.P_Type, d.P_Size);
    loadAddonServices(d.P_Type, d.P_Size); // 【新增】同時載入加購服務
    loadHairServices(d.P_Type, d.P_Size); // 【新增】同時載入毛型服務
    loadDoubleHairServices(d.P_Type, d.P_Size); // 【新增】同時載入毛型服務
  }

  function renderStatusGrid(targetId, data, noneKey, noneLabel, grids, memos) {
    var isHealthy = data[noneKey] == 1;
    var html = '<div class="status-header-box ' + (isHealthy ? 'healthy' : 'warning') + '">' +
               '<input type="checkbox" ' + (isHealthy ? 'checked' : '') + ' disabled class="me-2"> ' + noneLabel + '</div>';
    
    html += '<div class="grid-container">';
    grids.forEach(function(item) {
      var active = data[item.k] == 1;
      html += '<div class="grid-item ' + (active ? 'active' : '') + '"><input type="checkbox" ' + (active ? 'checked' : '') + ' disabled class="me-2"> ' + item.l + '</div>';
    });
    html += '</div>';

    memos.forEach(function(item) {
      var active = data[item.k] == 1;
      html += '<div class="memo-box ' + (active ? 'active' : '') + '">' +
                '<div class="memo-title"><input type="checkbox" ' + (active ? 'checked' : '') + ' disabled class="me-2"> ' + item.l + ' 說明</div>' +
                '<div class="memo-content">' + (data[item.m] || '---') + '</div>' +
              '</div>';
    });
    document.getElementById(targetId).innerHTML = html;
  }

  function loadServices(pType, pSize) {
    var sel = document.getElementById('sel_mainService');
    sel.innerHTML = '<option value="">正在過濾服務...</option>';
    fetch(GAS_API_URL + "?action=getFilteredServices&pType=" + encodeURIComponent(pType) + "&pSize=" + encodeURIComponent(pSize))
      .then(function(res) { return res.json(); })
      .then(function(list) {
        serviceList = list;
        sel.innerHTML = '<option value="">-- 請選擇主服務 --</option>';
        if (list.error || list.length === 0) { sel.innerHTML = '<option value="">無相符服務</option>'; return; }
        list.forEach(function(svc) {
          var opt = document.createElement('option');
          opt.value = svc.name;
          opt.text = svc.name + " ($" + svc.price.toLocaleString() + ")";
          sel.add(opt);
        });
      });
  }

 // 【修改】載入加購服務清單 (改為下拉選單單選形式)
  function loadAddonServices(pType, pSize) {
    var sel = document.getElementById('sel_addonService');
    sel.innerHTML = '<option value="">正在過濾加購服務...</option>';
    
    fetch(GAS_API_URL + "?action=getFilteredAddonServices&pType=" + encodeURIComponent(pType) + "&pSize=" + encodeURIComponent(pSize))
      .then(function(res) { return res.json(); })
      .then(function(list) {
        addonList = list;
        sel.innerHTML = '<option value="">-- 無加購 --</option>'; // 預設選項
        
        if (list.error || list.length === 0) { 
          sel.innerHTML = '<option value="">無相符的加購服務</option>'; 
          return; 
        }
        
        // 將加購服務逐一加入下拉選單中
        list.forEach(function(svc) {
          var opt = document.createElement('option');
          opt.value = svc.name;
          opt.text = svc.name + " (+ $" + svc.price.toLocaleString() + ")";
          sel.add(opt);
        });
      })
      .catch(function(err) {
        sel.innerHTML = '<option value="">載入失敗，請稍後再試</option>';
        console.error("載入加購服務失敗:", err);
      });
  }

// 【新增】載入毛型服務清單
  function loadHairServices(pType, pSize) {
    var sel = document.getElementById('sel_hairService');
    sel.innerHTML = '<option value="">正在過濾毛型服務...</option>';
    
    fetch(GAS_API_URL + "?action=getFilteredHairServices&pType=" + encodeURIComponent(pType) + "&pSize=" + encodeURIComponent(pSize))
      .then(function(res) { return res.json(); })
      .then(function(list) {
        hairList = list;
        sel.innerHTML = '<option value="">-- 無加選毛型 --</option>'; // 預設選項
        
        if (list.error || list.length === 0) { 
          sel.innerHTML = '<option value="">無相符的毛型服務</option>'; 
          return; 
        }
        
        // 將毛型服務逐一加入下拉選單中
        list.forEach(function(svc) {
          var opt = document.createElement('option');
          opt.value = svc.name;
          opt.text = svc.name + " (+ $" + svc.price.toLocaleString() + ")";
          sel.add(opt);
        });
      })
      .catch(function(err) {
        sel.innerHTML = '<option value="">載入失敗，請稍後再試</option>';
        console.error("載入毛型服務失敗:", err);
      });
  }

// 【新增】載入毛型服務清單
  function loadDoubleHairServices(pType, pSize) {
    var sel = document.getElementById('sel_DoublehairService');
    sel.innerHTML = '<option value="">正在過濾毛型服務...</option>';
    
    fetch(GAS_API_URL + "?action=getFilteredDoubleHairServices&pType=" + encodeURIComponent(pType) + "&pSize=" + encodeURIComponent(pSize))
      .then(function(res) { return res.json(); })
      .then(function(list) {
        doublehairList = list;
        sel.innerHTML = '<option value="">-- 無加選毛型 --</option>'; // 預設選項
        
        if (list.error || list.length === 0) { 
          sel.innerHTML = '<option value="">無相符的毛型服務</option>'; 
          return; 
        }
        
        // 將毛型服務逐一加入下拉選單中
        list.forEach(function(svc) {
          var opt = document.createElement('option');
          opt.value = svc.name;
          opt.text = svc.name + " (+ $" + svc.price.toLocaleString() + ")";
          sel.add(opt);
        });
      })
      .catch(function(err) {
        sel.innerHTML = '<option value="">載入失敗，請稍後再試</option>';
        console.error("載入毛型服務失敗:", err);
      });
  }

// 【修改】計算總金額：主服務 + 加購項目 + 毛型項目
  function updateServicePrice() {
    var totalPrice = 0;
    
    // 1. 計算主服務金額
    var mainName = document.getElementById('sel_mainService').value;
    var foundMain = serviceList.find(function(s) { return s.name === mainName; });
    if (foundMain) {
      totalPrice += Number(foundMain.price);
    }
    
    // 2. 計算加購服務金額 (單選)
    var addonName = document.getElementById('sel_addonService').value;
    if (addonName) {
      var foundAddon = addonList.find(function(a) { return a.name === addonName; });
      if (foundAddon) {
        totalPrice += Number(foundAddon.price);
      }
    }

    // 3. 【新增】計算毛型服務金額 (單選)
    var hairName = document.getElementById('sel_hairService').value;
    if (hairName) {
      var foundHair = hairList.find(function(h) { return h.name === hairName; });
      if (foundHair) {
        totalPrice += Number(foundHair.price);
      }
    }

    // 4. 【新增】計算雙層毛型服務金額 (單選)
    var hairName = document.getElementById('sel_doublhairService').value;
    if (hairName) {
      var foundDoubleHair = doublehairList.find(function(d) { return h.name === hairName; });
      if (foundDoubleHair) {
        totalPrice += Number(foundDoubleHair.price);
      }
    }

    // 更新畫面顯示
    document.getElementById('txt_servicePrice').innerText = "$ " + totalPrice.toLocaleString();
  }

  function setLoadingState(isLoading) {
    document.getElementById('loadingOverlay').style.display = isLoading ? 'block' : 'none';
    document.getElementById('detailView').style.display = isLoading ? 'none' : 'block';
  }

  function toggleScanner() {
    var reader = document.getElementById('reader');
    var btn = document.getElementById('btn_scan');
    if (!scanner || !scanner.isScanning) {
      reader.style.display = 'block';
      btn.innerText = '❌ 關閉';
      scanner = new Html5Qrcode("reader");
      scanner.start({ facingMode: "environment" }, { fps: 10, qrbox: 250 }, function(text) {
        document.getElementById('inp_rid').value = text;
        stopScanner();
        doSearch();
      });
    } else { stopScanner(); }
  }

  function stopScanner() {
    if (scanner) scanner.stop().then(function() {
      document.getElementById('reader').style.display = 'none';
      document.getElementById('btn_scan').innerText = '📷 掃描';
    });
  }
</script>
</body>
</html>
