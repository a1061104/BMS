<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>今日預約報到 - 分步流程</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/html5-qrcode"></script>
  <style>
    :root { --primary-color: #0d566f; --bg-light: #f1f5f9; }
    body { background-color: var(--bg-light); font-family: 'Noto Sans TC', sans-serif; padding: 10px; }
    .container { max-width: 98% !important; margin: 0 auto; }
    #reader { width: 100%; max-width: 500px; margin: 0 auto 15px auto; border: 3px solid var(--primary-color); border-radius: 12px; display: none; overflow: hidden; }
    
    /* 步驟指示器樣式 */
    .stepper { display: flex; justify-content: space-around; margin-bottom: 25px; }
    .step-item { flex: 1; text-align: center; padding: 10px; border-bottom: 3px solid #cbd5e1; color: #94a3b8; font-weight: bold; }
    .step-item.active { border-bottom-color: var(--primary-color); color: var(--primary-color); }

    /* 卡片與內容樣式 */
    .field-label { font-weight: 700; color: var(--primary-color); margin-top: 25px; margin-bottom: 12px; font-size: 1.25rem; border-left: 6px solid var(--primary-color); padding-left: 15px; }
    .info-card { background: #fff; border: 1px solid #e2e8f0; border-radius: 15px; padding: 20px; margin-bottom: 12px; }
    .info-row { display: flex; flex-wrap: wrap; border-bottom: 1px solid #f1f5f9; padding: 10px 0; }
    .info-cell { flex: 1; min-width: 45%; display: flex; align-items: flex-start; }
    .info-label { font-weight: 600; color: #64748b; width: 100px; font-size: 1rem; flex-shrink: 0; }
    .info-val { color: #1e293b; font-weight: 500; font-size: 1.1rem; }
    
    /* 健康網格與注意事項自訂樣式 (依照您原程式邏輯) */
    .sick-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 8px; margin-top: 10px; }
    .sick-card { padding: 8px; border: 1px solid #e2e8f0; border-radius: 8px; font-size: 0.9rem; color: #64748b; }
    .sick-card.active { background: #fee2e2; border-color: #ef4444; color: #b91c1c; font-weight: bold; }
    .memo-area { margin-top: 12px; padding: 10px; background: #f8fafc; border-radius: 8px; }
    .badge-blacklist { background: #000; color: #fff; padding: 2px 8px; border-radius: 4px; font-size: 0.8rem; }
  </style>
</head>
<body>
<div class="container">
  <div class="d-flex justify-content-between align-items-center mb-4">
    <h2 class="fw-bold">📅 今日預約報到</h2>
    <button class="btn btn-outline-secondary px-3" onclick="window.location.href='index.html'">返回</button>
  </div>

  <div class="stepper">
    <div id="stepHeader1" class="step-item active">1. 資訊確認</div>
    <div id="stepHeader2" class="step-item">2. 選擇服務</div>
  </div>

  <div id="searchSection" class="info-card shadow-sm">
    <div id="reader"></div>
    <div class="input-group">
      <input type="text" id="inp_rid" class="form-control form-control-lg" placeholder="掃描或輸入單號">
      <button class="btn btn-dark px-3" id="btn_scan" onclick="toggleScanner()">📷</button>
      <button class="btn btn-primary px-4" id="btn_doSearch" onclick="doSearch()">查詢</button>
    </div>
  </div>

  <div id="view_step1" style="display:none;">
    <div id="cust_html"></div>
    <div id="pet_html"></div>
    <div id="sick_html"></div>
    <div id="wary_html"></div>
    
    <div class="mt-4 mb-5">
      <button class="btn btn-primary btn-lg w-100 py-3 fw-bold" onclick="showStep(2)">下一步：選取服務項目 →</button>
    </div>
  </div>

  <div id="view_step2" style="display:none;">
    <div class="field-label">主服務選擇</div>
    <div class="info-card">
      <select id="sel_mainService" class="form-select form-select-lg" style="height: 60px; border-radius: 12px;" onchange="updateServicePrice()">
        <option value="">-- 請選擇主服務 --</option>
      </select>
    </div>

    <div class="info-card mt-4">
      <div class="d-flex justify-content-between align-items-center">
        <span class="h5 mb-0 fw-bold text-secondary">預估服務總額</span>
        <span id="txt_servicePrice" class="h2 mb-0 fw-bold text-danger">$ 0</span>
      </div>
    </div>

    <div class="row g-2 mt-4 mb-5">
      <div class="col-4">
        <button class="btn btn-outline-secondary btn-lg w-100 py-3" onclick="showStep(1)">上一步</button>
      </div>
      <div class="col-8">
        <button class="btn btn-success btn-lg w-100 py-3 fw-bold" onclick="submitCheckIn()">確認報到完成</button>
      </div>
    </div>
  </div>

  <div id="loadingOverlay" style="display:none;" class="text-center py-5">
    <div class="spinner-border text-primary" role="status"></div>
    <div class="mt-2 fw-bold">處理中，請稍候...</div>
  </div>
</div>

<script>
  const GAS_API_URL = "https://script.google.com/macros/s/AKfycbyPKmtWJGdq9zqakegIi-GkWgBDij77CbnjeBz0EVFq5iZ8-ey_B_cpBDiywpYtRlY8DA/exec"; 
  let scanner;
  let serviceList = [];
  let currentPetData = null; // 暫存查詢到的寵物資料

  // 控制步驟切換
  function showStep(step) {
    document.getElementById('view_step1').style.display = (step === 1) ? 'block' : 'none';
    document.getElementById('view_step2').style.display = (step === 2) ? 'block' : 'none';
    
    // 更新指示器樣式
    document.getElementById('stepHeader1').className = (step === 1) ? 'step-item active' : 'step-item';
    document.getElementById('stepHeader2').className = (step === 2) ? 'step-item active' : 'step-item';
    
    window.scrollTo(0, 0);
  }

  function doSearch() {
    const rid = document.getElementById('inp_rid').value.trim();
    if(!rid) return;
    setLoading(true);
    
    fetch(`${GAS_API_URL}?action=searchBookingById&resId=${rid}`)
      .then(r => r.json())
      .then(res => {
        setLoading(false);
        if(res.error) { alert(res.msg); return; }
        currentPetData = res; // 儲存資料供後續步驟使用
        renderStep1(res);
        loadServices(res.P_Type, res.P_Size); // 預先讀取服務清單 [cite: 33]
        showStep(1);
      })
      .catch(err => { setLoading(false); alert("網路請求失敗"); });
  }

  function renderStep1(d) {
    // 渲染顧客與寵物資訊 (邏輯同原程式)
    document.getElementById('cust_html').innerHTML = `
      <div class="field-label">顧客資料 (ID: ${d.U_ID})</div>
      <div class="info-card">
        <div class="info-row">
          <div class="info-cell"><span class="info-label">名稱</span><span class="info-val">${d.U_Name} ${d.U_Flag==99?'<span class="badge-blacklist">黑名單</span>':''}</span></div>
          <div class="info-cell"><span class="info-label">電話</span><span class="info-val">${d.U_Phone || '---'}</span></div>
        </div>
      </div>`;

    document.getElementById('pet_html').innerHTML = `
      <div class="field-label">寵物資料</div>
      <div class="info-card">
        <div class="info-row">
          <div class="info-cell"><span class="info-label">名稱</span><span class="info-val">${d.P_Name} (${d.P_Type})</span></div>
          <div class="info-cell"><span class="info-label">體型</span><span class="info-val">${d.P_Size} / ${d.P_Weight}kg</span></div>
        </div>
      </div>`;

    renderGrid('sick_html', d, 'PS_None', [
      {k:'PS_CKD', l:'慢性腎衰竭'}, {k:'PS_RV', l:'狂犬病'}, {k:'PS_HI', l:'聽力受損'}, {k:'PS_VI', l:'視力受損'}, {k:'PS_HWD', l:'行動不便'}
    ], [], '健康無疾病');
    
    // 注意事項區域渲染 (簡化調用) [cite: 33]
    renderGrid('wary_html', d, 'PW_None', [
      {k:'PW_ASB', l:'攻擊性'}, {k:'PW_WN', l:'不親狗'}
    ], [], '無特殊注意事項');
  }

  function loadServices(pType, pSize) {
    const sel = document.getElementById('sel_mainService');
    sel.innerHTML = '<option value="">正在載入服務...</option>';
    
    fetch(`${GAS_API_URL}?action=getFilteredServices&pType=${encodeURIComponent(pType)}&pSize=${encodeURIComponent(pSize)}`)
      .then(r => r.json())
      .then(list => {
        serviceList = list;
        sel.innerHTML = '<option value="">-- 請選擇主服務 --</option>';
        if (list.length === 0) { sel.innerHTML = '<option value="">查無規格相符服務</option>'; return; }
        list.forEach(svc => {
          let opt = document.createElement('option');
          opt.value = svc.name;
          opt.text = `${svc.name} ($${svc.price})`;
          sel.add(opt);
        });
      });
  }

  function updateServicePrice() {
    const name = document.getElementById('sel_mainService').value;
    const found = serviceList.find(s => s.name === name);
    document.getElementById('txt_servicePrice').innerText = found ? "$ " + found.price.toLocaleString() : "$ 0";
  }

  function renderGrid(id, d, noneK, simple, complex, noneL) {
    const container = document.getElementById(id);
    let h = `<div class="field-label">${noneL}</div><div class="info-card">`;
    h += `<div class="sick-grid">`;
    simple.forEach(i => h += `<div class="sick-card ${d[i.k]==1?'active':''}">${i.l}</div>`);
    h += `</div></div>`;
    container.innerHTML = h;
  }

  function setLoading(l) { document.getElementById('loadingOverlay').style.display = l ? 'block' : 'none'; }
  
  function toggleScanner() { /* 掃描邏輯同原檔 */ }
  
  function submitCheckIn() {
    const svc = document.getElementById('sel_mainService').value;
    if(!svc) { alert("請選擇主服務"); return; }
    alert("準備提交報到：單號 " + currentPetData.resId + " 服務：" + svc);
    // 此處後續可串接 doPost 更新資料庫
  }
</script>
</body>
</html>
