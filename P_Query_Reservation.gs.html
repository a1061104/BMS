<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>預約單日查詢系統</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; padding: 20px; background-color: #f9f9f9; }
        .container { max-width: 1000px; margin: auto; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .search-bar { display: flex; gap: 10px; margin-bottom: 20px; align-items: center; }
        input[type="date"] { padding: 8px; border: 1px solid #ccc; border-radius: 4px; }
        button { padding: 8px 16px; background-color: #007bff; color: white; border: none; border-radius: 4px; cursor: pointer; }
        button:hover { background-color: #0056b3; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { padding: 10px; border: 1px solid #ddd; text-align: left; }
        th { background-color: #f1f1f1; }
        .status-badge { padding: 4px 8px; border-radius: 12px; font-size: 0.85em; }
        .status-ok { background-color: #d4edda; color: #155724; }
        .status-cancel { background-color: #f8d7da; color: #721c24; }
    </style>
</head>
<body>

<div class="container">
    <h2>預約單日查詢</h2>
    <div class="search-bar">
        <label for="queryDate">選擇日期：</label>
        <input type="date" id="queryDate" required>
        <button onclick="fetchReservations()">查詢</button>
    </div>

    <div id="loading" style="display: none;">資料載入中，請稍候...</div>

    <table id="resultTable" style="display: none;">
        <thead>
            <tr>
                <th>預約ID</th>
                <th>時間</th>
                <th>客戶/寵物 ID</th>
                <th>服務項目</th>
                <th>美容師ID</th>
                <th>狀態</th>
                <th>確認/報到</th>
            </tr>
        </thead>
        <tbody id="tableBody">
            </tbody>
    </table>
</div>

<script>
    // ⚠️ 請將下方 URL 替換為您 GAS 部署為網頁應用程式後的網址
    const GAS_WEB_APP_URL = "https://script.google.com/macros/s/AKfycbyPKmtWJGdq9zqakegIi-GkWgBDij77CbnjeBz0EVFq5iZ8-ey_B_cpBDiywpYtRlY8DA/exec";

    async function fetchReservations() {
        const dateInput = document.getElementById('queryDate').value;
        if (!dateInput) {
            alert('請先選擇日期！');
            return;
        }

        document.getElementById('loading').style.display = 'block';
        document.getElementById('resultTable').style.display = 'none';
        const tbody = document.getElementById('tableBody');
        tbody.innerHTML = ''; // 清空舊資料

        try {
            // 組裝 GET 請求 URL，與 code.gs 的設定呼應
            const targetUrl = `${GAS_WEB_APP_URL}?action=getReservationsByDate&date=${dateInput}`;
            
            const response = await fetch(targetUrl);
            const data = await response.json();

            if (data.error) {
                alert('後端發生錯誤: ' + data.msg);
                return;
            }

            if (data.length === 0) {
                tbody.innerHTML = '<tr><td colspan="7" style="text-align:center;">此日期無預約紀錄</td></tr>';
            } else {
                data.forEach(item => {
                    // 處理狀態標籤的顯示邏輯
                    const isCancelled = item.R_Flag == "0";
                    const statusHtml = `<span class="status-badge ${isCancelled ? 'status-cancel' : 'status-ok'}">
                        ${isCancelled ? '已取消' : '有效'}
                    </span>`;
                    
                    const confirmText = item.R_Confirm == "1" ? "已確認" : "未確認";
                    const checkInText = item.R_CheckIn == "1" ? "已報到" : "未報到";

                    const row = `<tr>
                        <td>${item.R_ID}</td>
                        <td>${item.R_StartTime} - ${item.R_EndTime}</td>
                        <td>${item.U_ID} / ${item.P_ID}</td>
                        <td>${item.R_Server}</td>
                        <td>${item.B_ID}</td>
                        <td>${statusHtml}</td>
                        <td>${confirmText} / ${checkInText}</td>
                    </tr>`;
                    tbody.innerHTML += row;
                });
            }
            document.getElementById('resultTable').style.display = 'table';
            
        } catch (error) {
            console.error("Fetch Error:", error);
            alert("連線失敗，請檢查網頁主控台 (Console)");
        } finally {
            document.getElementById('loading').style.display = 'none';
        }
    }

    // 預設將日期設定為今天
    document.getElementById('queryDate').value = new Date().toISOString().split('T')[0];
</script>

</body>

</html>
