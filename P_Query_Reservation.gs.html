<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>預約單日行事曆系統</title>
    <script src='https://cdn.jsdelivr.net/npm/fullcalendar@6.1.10/index.global.min.js'></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; padding: 20px; background-color: #f9f9f9; }
        .container { max-width: 1100px; margin: auto; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .search-bar { display: flex; gap: 10px; margin-bottom: 20px; align-items: center; }
        input[type="date"] { padding: 8px; border: 1px solid #ccc; border-radius: 4px; }
        button { padding: 8px 16px; background-color: #007bff; color: white; border: none; border-radius: 4px; cursor: pointer; }
        button:hover { background-color: #0056b3; }
        
        /* 行事曆容器設定 */
        #calendar {
            margin-top: 20px;
            margin-bottom: 30px;
            min-height: 600px;
        }

        /* 隱藏 FullCalendar 預設的頭部，因為我們有自己的日期搜尋器 */
        .fc-header-toolbar { display: none !important; }

        /* 狀態顏色圖例 */
        .legend { display: flex; gap: 15px; margin-bottom: 10px; font-size: 0.9em; }
        .legend-item { display: flex; align-items: center; gap: 5px; }
        .color-box { width: 15px; height: 15px; border-radius: 3px; }

        table { width: 100%; border-collapse: collapse; margin-top: 20px; font-size: 0.9em; }
        th, td { padding: 8px; border: 1px solid #ddd; text-align: left; }
        th { background-color: #f1f1f1; }
    </style>
</head>
<body>

<div class="container">
    <h2>預約行事曆查詢 📅</h2>
    
    <div class="search-bar">
        <label for="queryDate">選擇日期：</label>
        <input type="date" id="queryDate" required>
        <button onclick="fetchReservations()">查詢此日預約</button>
    </div>

    <div class="legend" id="legend" style="display: none;">
        <div class="legend-item"><div class="color-box" style="background-color: #28a745;"></div>已確認</div>
        <div class="legend-item"><div class="color-box" style="background-color: #007bff;"></div>未確認</div>
        <div class="legend-item"><div class="color-box" style="background-color: #dc3545;"></div>已取消</div>
    </div>

    <div id="loading" style="display: none; color: #666;">資料載入與繪圖中，請稍候...</div>

    <div id="calendar"></div>

    <table id="resultTable" style="display: none;">
        <thead>
            <tr>
                <th>預約ID</th>
                <th>時間</th>
                <th>客戶姓名</th> 
                <th>聯絡電話</th> 
                <th>寵物姓名</th> 
                <th>服務項目</th>
                <th>美容師ID</th>
                <th>狀態</th>
            </tr>
        </thead>
        <tbody id="tableBody"></tbody>
    </table>
</div>

<script>
    // 您正確的 GAS 網頁應用程式 URL
    const GAS_WEB_APP_URL = "https://script.google.com/macros/s/AKfycbyPKmtWJGdq9zqakegIi-GkWgBDij77CbnjeBz0EVFq5iZ8-ey_B_cpBDiywpYtRlY8DA/exec"; 
    
    let calendar; // 儲存行事曆實例

    // 初始化行事曆框架
    document.addEventListener('DOMContentLoaded', function() {
        const calendarEl = document.getElementById('calendar');
        calendar = new FullCalendar.Calendar(calendarEl, {
            initialView: 'timeGridDay',
            locale: 'zh-tw',
            allDaySlot: false,
            slotMinTime: '08:00:00',
            slotMaxTime: '22:00:00',
            slotDuration: '00:30:00',
            expandRows: true,
            eventClick: function(info) {
                const props = info.event.extendedProps;
                // ★ 彈出視窗也加入聯絡電話
                alert(`預約詳細資訊：\n\n預約單號：${props.rId}\n服務項目：${info.event.title}\n客戶名稱：${props.uName}\n聯絡電話：${props.uPhone}\n寵物名稱：${props.pName}\n美容師：${props.bId}`);
            }
        });
        calendar.render();

        // 預設設定日期為今天，並自動查一次
        document.getElementById('queryDate').value = new Date().toISOString().split('T')[0];
    });

    async function fetchReservations() {
        const dateInput = document.getElementById('queryDate').value;
        if (!dateInput) {
            alert('請先選擇日期！');
            return;
        }

        document.getElementById('loading').style.display = 'block';
        document.getElementById('legend').style.display = 'none';
        document.getElementById('resultTable').style.display = 'none';
        
        const tbody = document.getElementById('tableBody');
        tbody.innerHTML = ''; 

        try {
            const targetUrl = `${GAS_WEB_APP_URL}?action=getReservationsByDate&date=${dateInput}`;
            const response = await fetch(targetUrl);
            const data = await response.json();

            if (data.error) {
                alert('後端發生錯誤: ' + data.msg);
                return;
            }

            // --- 排序：依據預約開始時間 (R_StartTime) 進行排序 ---
            data.sort((a, b) => {
                if (!a.R_StartTime) return 1;
                if (!b.R_StartTime) return -1;
                return a.R_StartTime.localeCompare(b.R_StartTime);
            });

            // --- 1. 更新行事曆資料 ---
            const calendarEvents = data.filter(item => item.R_Flag != "0").map(item => {
                let eventColor = '#007bff'; 
                if (item.R_Confirm == "1") eventColor = '#28a745'; 

                return {
                    id: item.R_ID,
                    title: `${item.R_ID} | ${item.U_Name} | ${item.P_Name} | ${item.R_Server_Desc}`, 
                    start: `${item.R_Date}T${item.R_StartTime}:00`, 
                    end: `${item.R_Date}T${item.R_EndTime}:00`,
                    backgroundColor: eventColor,
                    borderColor: eventColor,
                    extendedProps: {
                        uName: item.U_Name, 
                        uPhone: item.U_Phone || "無資料", // ★ 接收電話資料
                        pName: item.P_Name, 
                        bId: item.B_ID,
                        rId: item.R_ID
                    }
                };
            });

            calendar.gotoDate(dateInput);
            calendar.removeAllEvents();
            calendar.addEventSource(calendarEvents);
            document.getElementById('legend').style.display = 'flex';

            // --- 2. 更新下方表格 ---
            if (data.length === 0) {
                // ★ 這裡改為 colspan="8"
                tbody.innerHTML = '<tr><td colspan="8" style="text-align:center;">此日期無預約紀錄</td></tr>';
            } else {
                data.forEach(item => {
                    const isCancelled = item.R_Flag == "0";
                    const statusText = isCancelled ? "已取消" : (item.R_Confirm == "1" ? "已確認" : "未確認");
                    const rowStyle = isCancelled ? 'style="text-decoration: line-through; color: #999;"' : '';

                    // ★ 將姓名拆開，並加入聯絡電話欄位
                    const row = `<tr ${rowStyle}>
                        <td>${item.R_ID}</td>
                        <td>${item.R_StartTime} - ${item.R_EndTime}</td>
                        <td>${item.U_Name}</td>
                        <td>${item.U_Phone || ''}</td>
                        <td>${item.P_Name}</td>
                        <td>${item.R_Server_Desc}</td>
                        <td>${item.B_ID}</td>
                        <td>${statusText}</td>
                    </tr>`;
                    tbody.innerHTML += row;
                });
            }
            document.getElementById('resultTable').style.display = 'table';
            
        } catch (error) {
            console.error("Fetch Error:", error);
            alert("連線失敗，請檢查網址是否正確，或查看網頁主控台 (Console)");
        } finally {
            document.getElementById('loading').style.display = 'none';
        }
    }
</script>

</body>
</html>
